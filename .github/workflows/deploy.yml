name: CI/CD Spring Boot

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: salih585/demo-github
  CONTAINER_NAME: demo-github-app
  APP_PORT: "8080"

jobs:

  # =========================
  # 1. TEST
  # =========================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn clean test -B

  # =========================
  # 2. BUILD & PUSH DOCKER
  # =========================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  # =========================
  # 3. SCAN TRIVY
  # =========================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Notification echec scan
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "[ECHEC] Scan Trivy - ${{ github.repository }}"
          to: diallosalia824@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Vulnerabilites critiques detectees dans l'image Docker.

            Image    : ${{ env.DOCKER_IMAGE }}:latest
            Commit   : ${{ github.sha }}
            Auteur   : ${{ github.actor }}
            Branche  : ${{ github.ref_name }}
            Lien     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # =========================
  # 4. DEPLOY STAGING
  # =========================
  deploy-staging:
    runs-on: self-hosted
    needs: security-scan
    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - name: Sauvegarde image precedente (staging)
        run: |
          PREVIOUS=$(docker inspect demo-github-staging \
            --format='{{.Config.Image}}' 2>/dev/null || true)
          if [ -z "$PREVIOUS" ]; then PREVIOUS="none"; fi
          printf 'PREVIOUS_IMAGE=%s\n' "$PREVIOUS" >> $GITHUB_ENV

      - name: Deploy staging
        run: |
          docker stop demo-github-staging || true
          docker rm demo-github-staging || true
          docker pull salih585/demo-github:latest
          docker run -d \
            --name demo-github-staging \
            -p 8081:8080 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=staging \
            salih585/demo-github:latest
          echo "Staging deploye sur le port 8081"

      - name: Verification sante staging
        id: healthcheck-staging
        run: |
          sleep 15
          STATUS=$(docker inspect demo-github-staging \
            --format='{{.State.Status}}' 2>/dev/null || echo "absent")
          echo "Statut staging : $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "ECHEC : staging ne repond pas"
            exit 1
          fi
          echo "OK : staging operationnel sur le port 8081"

      - name: Rollback staging
        if: failure()
        run: |
          docker stop demo-github-staging || true
          docker rm demo-github-staging || true
          if [ "${{ env.PREVIOUS_IMAGE }}" != "none" ]; then
            docker run -d \
              --name demo-github-staging \
              -p 8081:8080 \
              --restart unless-stopped \
              ${{ env.PREVIOUS_IMAGE }}
            echo "Rollback staging effectue"
          fi

      - name: Notification succes staging
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "[SUCCES] Staging deploye - ${{ github.repository }}"
          to: diallosalia824@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Deploiement staging reussi.

            URL      : http://localhost:8081
            Image    : ${{ env.DOCKER_IMAGE }}:latest
            Commit   : ${{ github.sha }}
            Auteur   : ${{ github.actor }}
            Heure    : ${{ github.event.head_commit.timestamp }}
            Lien     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notification echec staging
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "[ECHEC] Staging en echec - ${{ github.repository }}"
          to: diallosalia824@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Echec du deploiement staging - rollback execute.

            Image    : ${{ env.DOCKER_IMAGE }}:latest
            Commit   : ${{ github.sha }}
            Auteur   : ${{ github.actor }}
            Lien     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # =========================
  # 5. DEPLOY PRODUCTION
  # =========================
  deploy-production:
    runs-on: self-hosted
    needs: deploy-staging
    environment:
      name: production
      url: http://localhost:8080

    steps:
      - name: Sauvegarde image precedente (prod)
        run: |
          PREVIOUS=$(docker inspect demo-github-app \
            --format='{{.Config.Image}}' 2>/dev/null || true)
          if [ -z "$PREVIOUS" ]; then PREVIOUS="none"; fi
          printf 'PREVIOUS_IMAGE=%s\n' "$PREVIOUS" >> $GITHUB_ENV

      - name: Deploy production
        run: |
          docker stop demo-github-app || true
          docker rm demo-github-app || true
          docker pull salih585/demo-github:latest
          docker run -d \
            --name demo-github-app \
            -p 8080:8080 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=prod \
            salih585/demo-github:latest
          echo "Production deployee sur le port 8080"

      - name: Verification sante production
        run: |
          sleep 15
          STATUS=$(docker inspect demo-github-app \
            --format='{{.State.Status}}' 2>/dev/null || echo "absent")
          if [ "$STATUS" != "running" ]; then
            echo "ECHEC production"
            exit 1
          fi
          echo "OK : production operationnelle"

      - name: Rollback production
        if: failure()
        run: |
          docker stop demo-github-app || true
          docker rm demo-github-app || true
          if [ "${{ env.PREVIOUS_IMAGE }}" != "none" ]; then
            docker run -d \
              --name demo-github-app \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ env.PREVIOUS_IMAGE }}
            echo "Rollback production effectue"
          fi

      - name: Nettoyage images
        if: success()
        run: docker image prune -f

      - name: Notification succes production
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "[SUCCES] Production deployee - ${{ github.repository }}"
          to: diallosalia824@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Deploiement production reussi.

            URL      : http://localhost:8080
            Image    : ${{ env.DOCKER_IMAGE }}:latest
            Commit   : ${{ github.sha }}
            Auteur   : ${{ github.actor }}
            Heure    : ${{ github.event.head_commit.timestamp }}
            Lien     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notification echec production
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "[ECHEC] Production en echec - ${{ github.repository }}"
          to: diallosalia824@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Echec du deploiement production - rollback execute.

            Image    : ${{ env.DOCKER_IMAGE }}:latest
            Commit   : ${{ github.sha }}
            Auteur   : ${{ github.actor }}
            Lien     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
