name: CI/CD Spring Boot

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: salih585/demo-github
  CONTAINER_NAME: demo-github-app
  APP_PORT: "8080"

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - run: mvn clean test -B

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  deploy:
    runs-on: self-hosted
    needs: security-scan
    steps:
      - name: Deploy container
        run: |
          docker stop demo-github-app || true
          docker rm demo-github-app || true
          docker pull salih585/demo-github:latest
          docker run -d \
            --name demo-github-app \
            -p 8080:8080 \
            --restart unless-stopped \
            salih585/demo-github:latest
          docker image prune -f
          echo "Deploiement termine avec succes"
