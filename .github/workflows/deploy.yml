name: CI/CD Spring Boot

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: salih585/demo-github
  CONTAINER_NAME: demo-github-app
  APP_PORT: "8080"

jobs:

  # =========================
  # 1. TEST
  # =========================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn clean test -B

  # =========================
  # 2. BUILD & PUSH DOCKER
  # =========================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  # =========================
  # 3. SCAN TRIVY
  # =========================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Notification echec scan
        if: failure()
        run: |
          echo "ECHEC : vulnerabilites critiques detectees dans l'image"
          echo "Image : ${{ env.DOCKER_IMAGE }}:latest"
          echo "Commit : ${{ github.sha }}"
          echo "Auteur : ${{ github.actor }}"

  # =========================
  # 4. DEPLOY STAGING
  # =========================
  deploy-staging:
    runs-on: self-hosted
    needs: security-scan
    environment:
      name: staging
      url: http://localhost:8081

    steps:
      - name: Sauvegarde image precedente (staging)
        run: |
          PREVIOUS=$(docker inspect demo-github-staging \
            --format='{{.Config.Image}}' 2>/dev/null || echo "none")
          echo "PREVIOUS_IMAGE=${PREVIOUS}" >> $GITHUB_ENV

      - name: Deploy staging
        run: |
          docker stop demo-github-staging || true
          docker rm demo-github-staging || true
          docker pull salih585/demo-github:latest
          docker run -d \
            --name demo-github-staging \
            -p 8081:8080 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=staging \
            salih585/demo-github:latest
          echo "Staging deploye sur le port 8081"

      - name: Verification sante staging
        id: healthcheck-staging
        run: |
          sleep 15
          STATUS=$(docker inspect demo-github-staging \
            --format='{{.State.Status}}' 2>/dev/null || echo "absent")
          echo "Statut staging : $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "ECHEC : staging ne repond pas"
            exit 1
          fi
          echo "OK : staging operationnel sur le port 8081"

      - name: Rollback staging
        if: failure()
        run: |
          docker stop demo-github-staging || true
          docker rm demo-github-staging || true
          if [ "${{ env.PREVIOUS_IMAGE }}" != "none" ]; then
            docker run -d \
              --name demo-github-staging \
              -p 8081:8080 \
              --restart unless-stopped \
              ${{ env.PREVIOUS_IMAGE }}
            echo "Rollback staging effectue"
          fi

      - name: Notification staging
        if: success()
        run: |
          echo "SUCCES staging"
          echo "URL : http://localhost:8081"
          echo "Commit : ${{ github.sha }}"

  # =========================
  # 5. DEPLOY PRODUCTION
  # =========================
  deploy-production:
    runs-on: self-hosted
    needs: deploy-staging
    environment:
      name: production
      url: http://localhost:8080

    steps:
      - name: Sauvegarde image precedente (prod)
        run: |
          PREVIOUS=$(docker inspect demo-github-app \
            --format='{{.Config.Image}}' 2>/dev/null || echo "none")
          echo "PREVIOUS_IMAGE=${PREVIOUS}" >> $GITHUB_ENV

      - name: Deploy production
        run: |
          docker stop demo-github-app || true
          docker rm demo-github-app || true
          docker pull salih585/demo-github:latest
          docker run -d \
            --name demo-github-app \
            -p 8080:8080 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=prod \
            salih585/demo-github:latest
          echo "Production deployee sur le port 8080"

      - name: Verification sante production
        run: |
          sleep 15
          STATUS=$(docker inspect demo-github-app \
            --format='{{.State.Status}}' 2>/dev/null || echo "absent")
          if [ "$STATUS" != "running" ]; then
            echo "ECHEC production"
            exit 1
          fi
          echo "OK : production operationnelle"

      - name: Rollback production
        if: failure()
        run: |
          docker stop demo-github-app || true
          docker rm demo-github-app || true
          if [ "${{ env.PREVIOUS_IMAGE }}" != "none" ]; then
            docker run -d \
              --name demo-github-app \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ env.PREVIOUS_IMAGE }}
            echo "Rollback production effectue"
          fi

      - name: Nettoyage images
        if: success()
        run: docker image prune -f

      - name: Notification succes production
        if: success()
        run: |
          echo "SUCCES production"
          echo "Image : ${{ env.DOCKER_IMAGE }}:latest"
          echo "Commit : ${{ github.sha }}"
          echo "Auteur : ${{ github.actor }}"
          echo "Heure  : $(date)"

      - name: Notification echec production
        if: failure()
        run: |
          echo "ECHEC production - rollback execute"
          echo "Commit : ${{ github.sha }}"
